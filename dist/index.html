  /* ── Mobile bottom nav ── */
  .mobile-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--c-surface, #fff);
    border-top: 1px solid var(--c-line, #eee);
    z-index: 900;
    padding: 6px 0 max(6px, env(safe-area-inset-bottom));
    gap: 0;
  }
  .mobile-nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    background: none;
    border: none;
    padding: 6px 4px;
    cursor: pointer;
    color: var(--c-ink-mute, #999);
    font-size: 10px;
    font-weight: 500;
    line-height: 1;
    transition: color .15s;
  }
  .mobile-nav-item.active {
    color: var(--c-accent, #ff5c4d);
  }
  .mobile-nav-sos {
    flex: 1.2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
    position: relative;
    top: -10px;
  }
  .mobile-nav-sos-circle {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #FF5C4D;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(255,92,77,.45);
  }
  .mobile-nav-sos-label {
    color: var(--c-ink-mute, #999);
    font-size: 10px;
    font-weight: 600;
    margin-top: 2px;
  }
  .mobile-more-sheet {
    position: fixed;
    inset: 0;
    z-index: 950;
  }
  .mobile-more-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.35);
  }
  .mobile-more-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: var(--c-surface, #fff);
    border-radius: 20px 20px 0 0;
    padding: 12px 20px max(24px, env(safe-area-inset-bottom));
  }
  .mobile-more-handle {
    width: 36px; height: 4px;
    background: var(--c-line, #ddd);
    border-radius: 999px;
    margin: 0 auto 18px;
  }
  .mobile-more-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .mobile-more-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    background: var(--c-bg, #f9f7f4);
    border: none;
    border-radius: 14px;
    padding: 16px 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--c-ink, #1f1b2e);
  }
  .mobile-more-btn-icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  @media (max-width: 768px) {
    .sidebar       { display: none !important; }
    .main          { margin-left: 0 !important; }
    .mobile-nav    { display: flex !important; }
    .content       { padding-bottom: 90px !important; }
    .topbar        { padding-left: 16px !important; }
  }
  @media (min-width: 769px) {
    .mobile-nav { display: none !important; }
  }

  .map-geo-btn {
    position: absolute;
    right: 10px;
    z-index: 999;
    width: 36px; height: 36px;
    border-radius: 8px;
    background: #fff;
    border: 1px solid rgba(0,0,0,.15);
    box-shadow: 0 2px 6px rgba(0,0,0,.12);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px;
    transition: background .15s;
  }
  .map-geo-btn:hover { background: #f5f5f5; }
  .map-geo-btn.locating { animation: pulse-geo .8s infinite alternate; }
  @keyframes pulse-geo { from { opacity:1; } to { opacity:.4; } }

  .map-search-wrap {
    position: absolute;
    top: 10px; left: 10px; right: 54px;
    z-index: 999;
  }
  .map-search-input-row {
    display: flex;
    align-items: center;
    background: #fff;
    border: 1px solid rgba(0,0,0,.15);
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,.14);
    padding: 0 10px;
    gap: 6px;
    height: 36px;
  }
  .map-search-input-row input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 13px;
    background: transparent;
    color: var(--c-ink, #1f1b2e);
    min-width: 0;
  }
  .map-search-input-row input::placeholder { color: #aaa; }
  .map-search-clear {
    background: none; border: none;
    cursor: pointer; color: #aaa;
    font-size: 17px; padding: 0; line-height: 1;
  }
  .map-search-clear:hover { color: #555; }
  .map-search-results {
    background: #fff;
    border: 1px solid rgba(0,0,0,.1);
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,.13);
    margin-top: 6px;
    overflow: hidden;
    max-height: 220px;
    overflow-y: auto;
  }
  .map-search-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-size: 13px;
    border-bottom: 1px solid #f0f0f0;
    transition: background .1s;
  }
