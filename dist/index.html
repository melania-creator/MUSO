  /* ── Mobile bottom nav ── */
  .mobile-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--c-surface, #fff);
    border-top: 1px solid var(--c-line, #eee);
    z-index: 900;
    padding: 6px 0 max(6px, env(safe-area-inset-bottom));
    gap: 0;
  }
  .mobile-nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    background: none;
    border: none;
    padding: 6px 4px;
    cursor: pointer;
    color: var(--c-ink-mute, #999);
    font-size: 10px;
    font-weight: 500;
    line-height: 1;
    transition: color .15s;
  }
  .mobile-nav-item.active {
    color: var(--c-accent, #ff5c4d);
  }
  .mobile-nav-sos {
    flex: 1.2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
    position: relative;
    top: -10px;
  }
  .mobile-nav-sos-circle {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: #FF5C4D;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(255,92,77,.45);
  }
  .mobile-nav-sos-label {
    color: var(--c-ink-mute, #999);
    font-size: 10px;
    font-weight: 600;
    margin-top: 2px;
  }
  .mobile-more-sheet {
    position: fixed;
    inset: 0;
    z-index: 950;
  }
  .mobile-more-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.35);
  }
  .mobile-more-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: var(--c-surface, #fff);
    border-radius: 20px 20px 0 0;
    padding: 12px 20px max(24px, env(safe-area-inset-bottom));
  }
  .mobile-more-handle {
    width: 36px; height: 4px;
    background: var(--c-line, #ddd);
    border-radius: 999px;
    margin: 0 auto 18px;
  }
  .mobile-more-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .mobile-more-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    background: var(--c-bg, #f9f7f4);
    border: none;
    border-radius: 14px;
    padding: 16px 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--c-ink, #1f1b2e);
  }
  .mobile-more-btn-icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  @media (max-width: 768px) {
    .sidebar       { display: none !important; }
    .main          { margin-left: 0 !important; }
    .mobile-nav    { display: flex !important; }
    .content       { padding-bottom: 90px !important; }
    .topbar        { padding-left: 16px !important; }
  }
  @media (min-width: 769px) {
    .mobile-nav { display: none !important; }
  }

  .sos-tile-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 10px;
  }
  .sos-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 14px 8px;
    border-radius: 14px;
    border: 2px solid var(--c-line, #eee);
    background: var(--c-bg, #f9f7f4);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: border-color .15s, background .15s;
  }
  .sos-tile.selected {
    border-color: #FF5C4D;
    background: #FFF0EE;
    color: #CC2200;
  }
  .sos-tile-emoji { font-size: 26px; line-height: 1; }
  .location-detected {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 14px;
    background: #F0FBF4;
    border: 1.5px solid #6DBF8A;
    margin: 16px 0;
  }
  .location-detected .loc-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #6DBF8A;
    display: flex; align-items: center; justify-content: center;
    color: #fff; flex-shrink: 0;
  }
  .location-detecting {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 14px;
    background: var(--c-bg, #f9f7f4);
    border: 1.5px solid var(--c-line, #eee);
    margin: 16px 0;
    color: var(--c-ink-mute);
    font-size: 13px;
  }
  .spin {
    animation: spin .8s linear infinite;
    display: inline-block;
